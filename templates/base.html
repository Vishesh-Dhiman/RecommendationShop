<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="pg-title">ShopDeals</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<nav class="navbar" id="navbar">
  <div class="nav-top">
    <a href="/" class="nav-logo">
      <span class="logo-icon">🛒</span>
      <span class="logo-text">ShopDeals</span>
    </a>
    <form class="nav-search-form" onsubmit="navSearch(event)">
      <input id="nav-q" type="text" placeholder="Search products, brands, categories…" autocomplete="off"/>
      <button type="submit">🔍</button>
    </form>
    <div class="nav-right">
      <a href="/cart" class="nav-cart-btn">
        🛒 <span id="nav-cart-count" class="cart-badge">0</span>
      </a>
      <div class="nav-user-wrap" id="nav-user-wrap" style="display:none">
        <div class="nav-avatar" id="nav-avatar" onclick="toggleUserMenu()">?</div>
        <div class="user-menu" id="user-menu">
          <div class="user-menu-header">
            <div id="um-name" class="um-name"></div>
            <div id="um-uname" class="um-uname"></div>
          </div>
          <a href="/profile" onclick="closeMenus()">👤 My Profile</a>
          <a href="/cart"    onclick="closeMenus()">🛒 My Cart</a>
          <div class="um-divider"></div>
          <a href="/logout">🚪 Logout</a>
        </div>
      </div>
    </div>
  </div>
  <div class="cat-bar">
    <div class="cat-bar-scroll" id="cat-bar">
      <a href="/" class="cat-link active">All</a>
    </div>
  </div>
</nav>

<div id="main-content">{% block content %}{% endblock %}</div>

<footer class="footer">
  <div class="footer-in">
    <span>🛒 ShopDeals — E-Commerce Recommendation System</span>
    <span>Govt. Polytechnic Bighapur, Unnao · CSE 6th Sem Major Project</span>
  </div>
</footer>

<div class="toast-wrap" id="toast"></div>

<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
