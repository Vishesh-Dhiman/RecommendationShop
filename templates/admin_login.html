<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Login — ShopDeals</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="login-page">
<div class="login-card" style="max-width:380px">
  <div class="login-top" style="background:linear-gradient(135deg,#1a1a2e,#16213e)">
    <div class="login-logo">🔐 Admin Panel</div>
    <div class="login-sub">ShopDeals Administration</div>
  </div>
  <div class="login-body">
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input class="form-input" name="username" placeholder="admin" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" type="password" name="password" placeholder="admin" required/>
      </div>
      <button type="submit" class="btn-login" style="background:#1a1a2e">Login to Admin →</button>
    </form>
    <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-top:14px">
      Default: admin / admin &nbsp;·&nbsp; <a href="/">← Back to Store</a>
    </p>
  </div>
</div>
</body>
</html>
